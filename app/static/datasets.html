<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/svg+xml" href="/static/favicon.svg">
    <title>Argus — 数据集管理</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <script src="/static/theme.js"></script>
    <script src="/static/loading.js"></script>
    <style>
        :root{--bg:#f5f0eb;--bg-card:rgba(255,255,255,0.55);--bg-card-solid:#fff;--bg-input:rgba(0,0,0,0.03);--border:rgba(0,0,0,0.06);--ink:#1a1a1a;--ink-light:#3d3d3d;--ink-muted:#8a8580;--ink-faint:#c4bfb8;--accent:rgba(26,26,26,0.06);--success:#2d7a4f;--success-bg:rgba(45,122,79,0.08);--danger:#b33a3a;--danger-bg:rgba(179,58,58,0.08);--radius:999px;--radius-md:12px;--radius-lg:16px;--shadow-sm:0 1px 2px rgba(0,0,0,0.04);--transition:0.2s ease}
        *{margin:0;padding:0;box-sizing:border-box}
        body{font-family:'Inter',-apple-system,sans-serif;background:var(--bg);min-height:100vh;color:var(--ink);line-height:1.5;-webkit-font-smoothing:antialiased}
        body::before{content:'';position:fixed;inset:0;background:radial-gradient(ellipse 80% 50% at 20% 30%,rgba(180,170,155,0.08) 0%,transparent 70%);pointer-events:none;z-index:0}
        ::-webkit-scrollbar{width:5px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:rgba(0,0,0,0.1);border-radius:3px}
        .header{position:relative;z-index:1;display:flex;align-items:center;justify-content:space-between;padding:14px 32px;border-bottom:1px solid var(--border);background:var(--bg-card);backdrop-filter:blur(20px)}
        .header-left{display:flex;align-items:center;gap:12px}
        .header-logo{width:34px;height:34px;background:var(--ink);border-radius:9px;display:flex;align-items:center;justify-content:center;color:var(--bg)}
        .header h1{font-size:1.1rem;font-weight:600}
        .header-right{display:flex;align-items:center;gap:8px}
        .header-link{color:var(--ink-muted);font-size:0.78rem;text-decoration:none;padding:5px 12px;border-radius:var(--radius);transition:var(--transition);border:1px solid transparent}
        .header-link:hover{color:var(--ink);border-color:var(--border)}
        .main{position:relative;z-index:1;max-width:1000px;margin:0 auto;padding:24px 32px 60px}
        .card{background:var(--bg-card);border:1px solid var(--border);border-radius:var(--radius-lg);backdrop-filter:blur(20px);overflow:hidden;box-shadow:var(--shadow-sm)}
        .card-head{display:flex;align-items:center;justify-content:space-between;padding:16px 20px;border-bottom:1px solid var(--border)}
        .card-title{display:flex;align-items:center;gap:8px;font-size:0.84rem;font-weight:600}
        .card-body{padding:20px}
        .btn{padding:7px 14px;border:none;border-radius:var(--radius);cursor:pointer;font-size:0.75rem;font-weight:500;font-family:inherit;transition:var(--transition);display:inline-flex;align-items:center;gap:4px}
        .btn-ghost{background:transparent;color:var(--ink-muted);border:1px solid var(--border)}
        .btn-ghost:hover{border-color:var(--ink-faint);color:var(--ink)}
        .btn-sm{padding:4px 10px;font-size:0.7rem}
        .dataset-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:16px}
        .dataset-card{background:var(--bg-input);border:1px solid var(--border);border-radius:var(--radius-md);padding:18px;transition:var(--transition)}
        .dataset-card:hover{border-color:var(--ink-faint)}
        .dataset-name{font-size:0.92rem;font-weight:600;margin-bottom:8px}
        .dataset-desc{font-size:0.75rem;color:var(--ink-muted);margin-bottom:14px;min-height:20px}
        .dataset-stats{display:flex;gap:16px;font-size:0.72rem;color:var(--ink-muted)}
        .dataset-stat{display:flex;flex-direction:column;align-items:center}
        .dataset-stat-val{font-size:1.15rem;font-weight:700;color:var(--ink)}
        .dataset-stat-label{font-size:0.65rem;color:var(--ink-faint)}
        .empty{text-align:center;padding:40px 16px;color:var(--ink-faint);font-size:0.84rem}
        .footer{text-align:center;padding:40px 0 0;color:var(--ink-faint);font-size:0.73rem}
        .source-tag{display:inline-flex;padding:2px 8px;border-radius:var(--radius);font-size:0.66rem;font-weight:500;background:var(--accent);color:var(--ink-muted)}
        .pager{display:flex;align-items:center;justify-content:space-between;padding:12px 0;margin-top:8px;font-size:0.72rem;color:var(--ink-muted)}
        .pager-btns{display:flex;gap:3px}
        .pager-btns button{padding:4px 10px;background:var(--bg-input);border:1px solid var(--border);border-radius:var(--radius);color:var(--ink-muted);font-size:0.7rem;font-family:inherit;cursor:pointer;transition:var(--transition)}
        .pager-btns button:hover:not(:disabled){border-color:var(--ink-faint);color:var(--ink)}
        .pager-btns button:disabled{opacity:0.3;cursor:not-allowed}
        .pager-btns button.active{background:var(--ink);color:var(--bg);border-color:var(--ink)}
    </style>
</head>
<body>
    <header class="header">
        <div class="header-left">
            <div class="header-logo"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg></div>
            <h1>Argus 智能监控</h1>
        </div>
        <div class="header-right">
            <a href="/" class="header-link">监控主页</a>
            <a href="/static/detect.html" class="header-link">图片检测</a>
            <button id="themeToggle" class="header-link" onclick="toggleTheme()" style="cursor:pointer;border:none;font-family:inherit;background:var(--accent);font-weight:500;">深色</button>
            <button class="header-link" onclick="doLogout()" style="cursor:pointer;border:none;font-family:inherit;background:var(--accent);font-weight:500;">退出登录</button>
        </div>
    </header>
    <div class="main">
        <div class="card">
            <div class="card-head">
                <span class="card-title">数据集（自动采集）</span>
                <button class="btn btn-ghost btn-sm" onclick="loadDatasets()">刷新</button>
            </div>
            <div class="card-body">
                <div class="dataset-grid" id="datasetList"><div class="empty">加载中...</div></div>
                <div class="pager" id="dsPager" style="display:none;">
                    <span id="dsPagerInfo"></span>
                    <div class="pager-btns" id="dsPagerBtns"></div>
                </div>
            </div>
        </div>
    </div>
    <footer class="footer">Argus 智能监控告警系统 v0.1.0</footer>
    <script>
        function authFetch(url,opts={}){const t=localStorage.getItem('token');if(!opts.headers)opts.headers={};if(t)opts.headers['Authorization']='Bearer '+t;return fetch(url,opts)}
        function doLogout(){localStorage.removeItem('token');localStorage.removeItem('user');fetch('/api/v1/auth/logout',{method:'POST'});window.location.href='/login'}
        async function scanDataset(id) {
            try {
                const r = await authFetch(`/api/v1/auth/datasets/${id}/scan`, { method: 'POST' });
                const d = await r.json();
                if (d.success) { showNotification(`扫描完成：${d.total} 张图片`, 'success'); loadDatasets(); }
                else showNotification(d.detail || '扫描失败', 'error');
            } catch (e) { showNotification('扫描失败', 'error'); }
        }

        let allDatasets = [];
        let dsPage = 1;
        const DS_PAGE_SIZE = 9;

        async function loadDatasets(){
            try{const r=await authFetch('/api/v1/auth/datasets');const d=await r.json();allDatasets=d.datasets||[];renderDsPage();}catch(e){console.error(e)}
        }

        function renderDsPage(){
            const c=document.getElementById('datasetList');
            if(!allDatasets.length){c.innerHTML='<div class="empty">暂无数据集<br><span style="font-size:0.72rem;color:var(--ink-faint);">标注图片后自动统计，或在「系统配置」中手动添加</span></div>';document.getElementById('dsPager').style.display='none';return}
            const totalPages=Math.ceil(allDatasets.length/DS_PAGE_SIZE);
            if(dsPage>totalPages)dsPage=totalPages;
            const start=(dsPage-1)*DS_PAGE_SIZE;
            const pageData=allDatasets.slice(start,start+DS_PAGE_SIZE);
            c.innerHTML=pageData.map(ds=>`<div class="dataset-card">
                <div class="dataset-name">${ds.name} <span class="source-tag">自动扫描</span></div>
                <div class="dataset-desc">${ds.description||'暂无描述'}</div>
                <div class="dataset-stats">
                    <div class="dataset-stat"><div class="dataset-stat-val">${ds.total_images||0}</div><div class="dataset-stat-label">总图片</div></div>
                    <div class="dataset-stat"><div class="dataset-stat-val">${ds.train_count||0}</div><div class="dataset-stat-label">训练集</div></div>
                    <div class="dataset-stat"><div class="dataset-stat-val">${ds.val_count||0}</div><div class="dataset-stat-label">验证集</div></div>
                    <div class="dataset-stat"><div class="dataset-stat-val">${ds.test_count||0}</div><div class="dataset-stat-label">测试集</div></div>
                </div>
                <div style="margin-top:12px;"><button class="btn btn-ghost btn-sm" onclick="scanDataset(${ds.id})">重新扫描</button></div>
            </div>`).join('');
            const pager=document.getElementById('dsPager');
            if(totalPages>1){
                pager.style.display='flex';
                document.getElementById('dsPagerInfo').textContent=`共 ${allDatasets.length} 个，第 ${dsPage}/${totalPages} 页`;
                let btns=`<button ${dsPage<=1?'disabled':''} onclick="dsPage=1;renderDsPage()">«</button>`;
                btns+=`<button ${dsPage<=1?'disabled':''} onclick="dsPage--;renderDsPage()">‹</button>`;
                for(let p=1;p<=totalPages;p++){if(totalPages>7&&p>2&&p<totalPages-1&&Math.abs(p-dsPage)>1){if(p===3||p===totalPages-2)btns+='<button disabled>…</button>';continue}btns+=`<button class="${p===dsPage?'active':''}" onclick="dsPage=${p};renderDsPage()">${p}</button>`}
                btns+=`<button ${dsPage>=totalPages?'disabled':''} onclick="dsPage++;renderDsPage()">›</button>`;
                btns+=`<button ${dsPage>=totalPages?'disabled':''} onclick="dsPage=${totalPages};renderDsPage()">»</button>`;
                document.getElementById('dsPagerBtns').innerHTML=btns;
            }else{pager.style.display='none'}
        }
        loadDatasets();
    </script>
</body>
</html>
