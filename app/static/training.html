<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/svg+xml" href="/static/favicon.svg">
    <title>Argus — 训练记录</title>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <script src="/static/theme.js"></script>
    <script src="/static/permissions.js"></script>
    <script src="/static/loading.js"></script>
    <style>
        :root{--bg:#f8f7f5;--bg-card:#fff;--bg-card-solid:#fff;--bg-input:#f5f4f2;--border:#e8e6e3;--ink:#1c1917;--ink-light:#44403c;--ink-muted:#78716c;--ink-faint:#a8a29e;--accent:#292524;--success:#16a34a;--success-bg:rgba(45,122,79,0.08);--danger:#dc2626;--danger-bg:rgba(179,58,58,0.08);--radius:8px;--radius-md:12px;--radius-lg:16px;--shadow-sm:0 1px 2px rgba(0,0,0,0.04);--transition:0.2s ease}
        *{margin:0;padding:0;box-sizing:border-box}
        body{font-family: 'DM Sans', -apple-system, sans-serif;background:var(--bg);min-height:100vh;color:var(--ink);line-height:1.5;-webkit-font-smoothing:antialiased}
        body::before{content:'';position:fixed;inset:0;background:radial-gradient(ellipse 80% 50% at 20% 30%,rgba(180,170,155,0.08) 0%,transparent 70%);pointer-events:none;z-index:0}
        ::-webkit-scrollbar{width:5px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:rgba(0,0,0,0.1);border-radius:3px}
        .topbar{position:relative;z-index:1;display:flex;align-items:center;justify-content:space-between;padding:14px 32px;border-bottom:1px solid var(--border);background:var(--bg-card);backdrop-filter:blur(20px)}
        .topbar-left{display:flex;align-items:center;gap:12px}
        .topbar-logo{width:34px;height:34px;background:var(--ink);border-radius:9px;display:flex;align-items:center;justify-content:center;color:var(--bg)}
        .topbar h1{font-size:1.1rem;font-weight:600}
        .topbar-right{display:flex;align-items:center;gap:8px}
        .topbar-btn{color:var(--ink-muted);font-size:0.78rem;text-decoration:none;padding:5px 12px;border-radius:var(--radius);transition:var(--transition);border:1px solid transparent}
        .topbar-btn:hover{color:var(--ink);border-color:var(--border)}
        .main{position:relative;z-index:1;max-width:1200px;margin:0 auto;padding:24px 32px 60px}
        .card{background:var(--bg-card);border:1px solid var(--border);border-radius:var(--radius-lg);backdrop-filter:blur(20px);overflow:hidden;box-shadow:var(--shadow-sm)}
        .card-head{display:flex;align-items:center;justify-content:space-between;padding:16px 20px;border-bottom:1px solid var(--border)}
        .card-title{display:flex;align-items:center;gap:8px;font-size:0.84rem;font-weight:600}
        .card-body{padding:0}
        .btn{padding:7px 14px;border:none;border-radius:var(--radius);cursor:pointer;font-size:0.75rem;font-weight:500;font-family:inherit;transition:var(--transition);display:inline-flex;align-items:center;gap:4px}
        .btn-ghost{background:transparent;color:var(--ink-muted);border:1px solid var(--border)}
        .btn-ghost:hover{border-color:var(--ink-faint);color:var(--ink)}
        .btn-sm{padding:4px 10px;font-size:0.7rem}
        .table{width:100%;border-collapse:collapse}
        .table th{text-align:left;padding:10px 16px;font-size:0.68rem;font-weight:600;color:var(--ink-muted);text-transform:uppercase;letter-spacing:0.04em;border-bottom:1px solid var(--border);background:var(--bg-input)}
        .table td{padding:10px 16px;font-size:0.8rem;border-bottom:1px solid var(--border)}
        .table tr:last-child td{border-bottom:none}
        .table tr:hover td{background:rgba(0,0,0,0.015)}
        .status-badge{display:inline-flex;padding:2px 8px;border-radius:var(--radius);font-size:0.68rem;font-weight:500}
        .status-badge.pending{background:var(--accent);color:var(--ink-muted)}
        .status-badge.running{background:rgba(8,145,178,0.1);color:#0891b2}
        .status-badge.completed{background:var(--success-bg);color:var(--success)}
        .status-badge.failed{background:var(--danger-bg);color:var(--danger)}
        .map-value{font-family:'JetBrains Mono',monospace;font-weight:600}
        .empty{text-align:center;padding:40px 16px;color:var(--ink-faint);font-size:0.84rem}
        .footer{text-align:center;padding:40px 0 0;color:var(--ink-faint);font-size:0.73rem}
        .source-tag{display:inline-flex;padding:2px 8px;border-radius:var(--radius);font-size:0.66rem;font-weight:500;background:var(--accent);color:var(--ink-muted)}
        .pager{display:flex;align-items:center;justify-content:space-between;padding:12px 16px;border-top:1px solid var(--border);font-size:0.72rem;color:var(--ink-muted)}
        .pager-btns{display:flex;gap:3px}
        .pager-btns button{padding:4px 10px;background:var(--bg-input);border:1px solid var(--border);border-radius:var(--radius);color:var(--ink-muted);font-size:0.7rem;font-family:inherit;cursor:pointer;transition:var(--transition)}
        .pager-btns button:hover:not(:disabled){border-color:var(--ink-faint);color:var(--ink)}
        .pager-btns button:disabled{opacity:0.3;cursor:not-allowed}
        .pager-btns button.active{background:var(--ink);color:var(--bg);border-color:var(--ink)}
    </style>
</head>
<body>
    <header class="topbar">
        <div class="topbar-left">
            <div class="topbar-logo"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg></div>
            <h1>Argus 智能监控</h1>
        </div>
        <div class="topbar-right">
            <a href="/" class="topbar-btn">监控主页</a>
            <a href="/static/detect.html" class="topbar-btn">图片检测</a>
            <a href="/static/dashboard.html" class="topbar-btn">数据看板</a>
            <button id="themeToggle" class="topbar-btn" onclick="toggleTheme()"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg></button>
            <button class="topbar-btn" onclick="doLogout()" style="cursor:pointer;border:none;font-family:inherit;background:var(--accent);font-weight:500;">退出登录</button>
        </div>
    </header>
    <div class="main">
        <div class="card">
            <div class="card-head">
                <span class="card-title">训练记录（自动采集）</span>
                <button class="btn btn-ghost btn-sm" onclick="loadRecords()">刷新</button>
            </div>
            <div class="card-body">
                <table class="table">
                    <thead><tr><th>模型</th><th>数据集</th><th>轮数</th><th>mAP@0.5</th><th>mAP@0.5:0.95</th><th>状态</th><th>来源</th></tr></thead>
                    <tbody id="recordList"><tr><td colspan="7"><div class="empty">加载中...</div></td></tr></tbody>
                </table>
                <div class="pager" id="trainPager" style="display:none;">
                    <span id="trainPagerInfo"></span>
                    <div class="pager-btns" id="trainPagerBtns"></div>
                </div>
            </div>
        </div>
    </div>
    <footer class="footer">Argus 智能监控告警系统 v0.1.0</footer>
    <script>
        function authFetch(url,opts={}){const t=localStorage.getItem('token');if(!opts.headers)opts.headers={};if(t)opts.headers['Authorization']='Bearer '+t; const csrf = document.cookie.match(/csrf_token=([^;]+)/); if (csrf) opts.headers['X-CSRF-Token'] = csrf[1];return fetch(url,opts)}
        function doLogout(){localStorage.removeItem('token');localStorage.removeItem('user');fetch('/api/v1/auth/logout',{method:'POST'});window.location.href='/login'}
        const SN={pending:'待训练',running:'训练中',completed:'已完成',failed:'失败'};
        let allRecords=[];
        let trainPage=1;
        const TRAIN_PAGE=10;

        async function loadRecords(){
            try{const r=await authFetch('/api/v1/auth/training');const d=await r.json();allRecords=d.records||[];renderTrainPage();}catch(e){console.error(e)}
        }

        function renderTrainPage(){
            const tb=document.getElementById('recordList');
            if(!allRecords.length){tb.innerHTML='<tr><td colspan="7"><div class="empty">暂无训练记录<br><span style="font-size:0.72rem;color:var(--ink-faint);">运行 <code style="background:var(--bg-input);padding:2px 6px;border-radius:4px;font-size:0.7rem;">python scripts/train.py --data xxx --record</code> 后自动出现</span></div></td></tr>';document.getElementById('trainPager').style.display='none';return}
            const totalPages=Math.ceil(allRecords.length/TRAIN_PAGE);
            if(trainPage>totalPages)trainPage=totalPages;
            const start=(trainPage-1)*TRAIN_PAGE;
            const pageData=allRecords.slice(start,start+TRAIN_PAGE);
            tb.innerHTML=pageData.map(r=>`<tr>
                <td style="font-weight:500;">${r.model_name}</td>
                <td>${r.dataset_name||'-'}</td>
                <td>${r.epochs||'-'}</td>
                <td class="map-value">${r.best_map50!=null?(r.best_map50*100).toFixed(1)+'%':'-'}</td>
                <td class="map-value">${r.best_map50_95!=null?(r.best_map50_95*100).toFixed(1)+'%':'-'}</td>
                <td><span class="status-badge ${r.status}">${SN[r.status]||r.status}</span></td>
                <td><span class="source-tag">${r.id?'数据库':'runs目录'}</span></td>
            </tr>`).join('');
            const pager=document.getElementById('trainPager');
            if(totalPages>1){
                pager.style.display='flex';
                document.getElementById('trainPagerInfo').textContent=`共 ${allRecords.length} 条，第 ${trainPage}/${totalPages} 页`;
                let btns=`<button ${trainPage<=1?'disabled':''} onclick="trainPage=1;renderTrainPage()">«</button>`;
                btns+=`<button ${trainPage<=1?'disabled':''} onclick="trainPage--;renderTrainPage()">‹</button>`;
                for(let p=1;p<=totalPages;p++){if(totalPages>7&&p>2&&p<totalPages-1&&Math.abs(p-trainPage)>1){if(p===3||p===totalPages-2)btns+='<button disabled>…</button>';continue}btns+=`<button class="${p===trainPage?'active':''}" onclick="trainPage=${p};renderTrainPage()">${p}</button>`}
                btns+=`<button ${trainPage>=totalPages?'disabled':''} onclick="trainPage++;renderTrainPage()">›</button>`;
                btns+=`<button ${trainPage>=totalPages?'disabled':''} onclick="trainPage=${totalPages};renderTrainPage()">»</button>`;
                document.getElementById('trainPagerBtns').innerHTML=btns;
            }else{pager.style.display='none'}
        }
        loadRecords();
    </script>
</body>
</html>
