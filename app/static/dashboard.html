<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/svg+xml" href="/static/favicon.svg">
    <title>Argus — 数据看板</title>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <script src="/static/theme.js"></script>
    <script src="/static/loading.js"></script>
    <style>
        :root{--bg:#f8f7f5;--bg-card:#fff;--bg-card-solid:#fff;--bg-input:#f5f4f2;--border:#e8e6e3;--ink:#1c1917;--ink-light:#44403c;--ink-muted:#78716c;--ink-faint:#a8a29e;--accent-soft:rgba(26,26,26,0.06);--success:#16a34a;--success-bg:rgba(45,122,79,0.08);--danger:#dc2626;--danger-bg:rgba(179,58,58,0.08);--warning:#d97706;--radius:8px;--radius-md:12px;--radius-lg:16px;--shadow:0 1px 3px rgba(0,0,0,0.04),0 8px 32px rgba(0,0,0,0.06);--shadow-sm:0 1px 2px rgba(0,0,0,0.04);--transition:0.2s ease}
        *{margin:0;padding:0;box-sizing:border-box}
        body{font-family: 'DM Sans', -apple-system, sans-serif;background:var(--bg);min-height:100vh;color:var(--ink);line-height:1.5;-webkit-font-smoothing:antialiased}
        body::before{content:'';position:fixed;inset:0;background:radial-gradient(ellipse 80% 50% at 20% 30%,rgba(180,170,155,0.08) 0%,transparent 70%),radial-gradient(ellipse 60% 40% at 75% 60%,rgba(160,150,135,0.06) 0%,transparent 60%);pointer-events:none;z-index:0}
        ::-webkit-scrollbar{width:5px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:rgba(0,0,0,0.1);border-radius:3px}

        .topbar{position:relative;z-index:1;display:flex;align-items:center;justify-content:space-between;padding:14px 32px;border-bottom:1px solid var(--border);background:var(--bg-card);backdrop-filter:blur(20px)}
        .topbar-left{display:flex;align-items:center;gap:12px}
        .topbar-logo{width:34px;height:34px;background:var(--ink);border-radius:9px;display:flex;align-items:center;justify-content:center;color:var(--bg);box-shadow:0 2px 8px rgba(0,0,0,0.15)}
        .topbar h1{font-size:1.1rem;font-weight:600}
        .topbar-right{display:flex;align-items:center;gap:8px}
        .topbar-btn{color:var(--ink-muted);font-size:0.78rem;text-decoration:none;padding:5px 12px;border-radius:var(--radius);transition:var(--transition);border:1px solid transparent}
        .topbar-btn:hover{color:var(--ink);border-color:var(--border)}

        .main{position:relative;z-index:1;max-width:1100px;margin:0 auto;padding:24px 32px 60px}

        .card{background:var(--bg-card);border:1px solid var(--border);border-radius:var(--radius-lg);backdrop-filter:blur(20px);overflow:hidden;box-shadow:var(--shadow-sm)}
        .card-head{display:flex;align-items:center;justify-content:space-between;padding:16px 20px;border-bottom:1px solid var(--border)}
        .card-title{display:flex;align-items:center;gap:8px;font-size:0.84rem;font-weight:600}
        .card-body{padding:20px}

        .stats-row{display:grid;grid-template-columns:repeat(4,1fr);gap:16px;margin-bottom:24px}
        .stat-card{background:var(--bg-card);border:1px solid var(--border);border-radius:var(--radius-lg);padding:20px;text-align:center;backdrop-filter:blur(20px)}
        .stat-label{font-size:0.68rem;font-weight:500;color:var(--ink-muted);text-transform:uppercase;letter-spacing:0.06em;margin-bottom:8px}
        .stat-value{font-size:1.8rem;font-weight:700;font-variant-numeric:tabular-nums}
        .stat-value.green{color:var(--success)}.stat-value.red{color:var(--danger)}.stat-value.blue{color:#0891b2}.stat-value.yellow{color:var(--warning)}

        .chart-row{display:grid;grid-template-columns:1fr 1fr;gap:20px;margin-bottom:24px}

        .chart-box{background:var(--bg-card);border:1px solid var(--border);border-radius:var(--radius-lg);backdrop-filter:blur(20px);overflow:hidden}
        .chart-head{padding:16px 20px;border-bottom:1px solid var(--border);font-size:0.84rem;font-weight:600}
        .chart-body{padding:20px;min-height:220px;position:relative}

        /* Bar chart */
        .bar-chart{display:flex;align-items:flex-end;gap:12px;height:180px;padding-top:24px}
        .bar-col{flex:1;display:flex;flex-direction:column;align-items:center;gap:6px}
        .bar{width:100%;border-radius:3px 3px 0 0;transition:height 0.4s ease;min-height:2px;opacity:0.85}
        .bar:hover{opacity:1}
        .bar-label{font-size:0.68rem;color:var(--ink-muted);white-space:nowrap;font-family:'JetBrains Mono',monospace}
        .bar-value{font-size:0.72rem;font-weight:600;color:var(--ink-light)}

        /* Donut chart */
        .donut-wrap{display:flex;align-items:center;justify-content:center;gap:32px;height:180px}
        .donut-legend{display:flex;flex-direction:column;gap:10px}
        .legend-item{display:flex;align-items:center;gap:10px;font-size:0.78rem;color:var(--ink-light)}
        .legend-dot{width:8px;height:8px;border-radius:2px;flex-shrink:0}
        .legend-count{font-weight:600;margin-left:auto;padding-left:16px;color:var(--ink);font-family:'JetBrains Mono',monospace}

        .footer{text-align:center;padding:40px 0 0;color:var(--ink-faint);font-size:0.73rem}
    </style>
</head>
<body>
    <header class="topbar">
        <div class="topbar-left">
            <div class="topbar-logo"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg></div>
            <h1>Argus 智能监控</h1>
        </div>
        <div class="topbar-right">
            <a href="/" class="topbar-btn">监控主页</a>
            <a href="/static/detect.html" class="topbar-btn">图片检测</a>
            <a href="/static/dashboard.html" class="topbar-btn" style="background:var(--accent-soft);color:var(--ink);font-weight:500;">数据看板</a>
            <a href="/static/users.html" class="topbar-btn">用户管理</a>
            <button id="themeToggle" class="topbar-btn" onclick="toggleTheme()" style="cursor:pointer;border:none;font-family:inherit;background:var(--accent-soft);font-weight:500;">深色</button>
            <button class="topbar-btn" onclick="doLogout()" style="cursor:pointer;border:none;font-family:inherit;background:var(--accent-soft);font-weight:500;">退出登录</button>
        </div>
    </header>

    <div class="main">
        <div class="stats-row">
            <div class="stat-card"><div class="stat-label">告警总数</div><div class="stat-value red" id="alarmTotal">-</div></div>
            <div class="stat-card"><div class="stat-label">今日告警</div><div class="stat-value yellow" id="alarmToday">-</div></div>
            <div class="stat-card"><div class="stat-label">检测总数</div><div class="stat-value blue" id="detectTotal">-</div></div>
            <div class="stat-card"><div class="stat-label">活跃流</div><div class="stat-value green" id="streamCount">-</div></div>
        </div>

        <div class="chart-row">
            <div class="chart-box">
                <div class="chart-head">近 7 天告警趋势</div>
                <div class="chart-body">
                    <div class="bar-chart" id="trendChart">
                        <div style="text-align:center;color:var(--ink-faint);width:100%;padding-top:60px;">加载中...</div>
                    </div>
                </div>
            </div>
            <div class="chart-box">
                <div class="chart-head">告警类型分布</div>
                <div class="chart-body">
                    <div class="donut-wrap" id="typeChart">
                        <div style="text-align:center;color:var(--ink-faint);width:100%;">加载中...</div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <footer class="footer">Argus 智能监控告警系统 v0.1.0</footer>

    <script src="/static/confirm.js"></script>
    <script>
        function authFetch(url, opts = {}) {
            const t = localStorage.getItem('token');
            if (!opts.headers) opts.headers = {};
            if (t) opts.headers['Authorization'] = 'Bearer ' + t; const csrf = document.cookie.match(/csrf_token=([^;]+)/); if (csrf) opts.headers['X-CSRF-Token'] = csrf[1];
            return fetch(url, opts);
        }

        function doLogout() {
            localStorage.removeItem('token');
            localStorage.removeItem('user');
            fetch('/api/v1/auth/logout', { method: 'POST' });
            window.location.href = '/login';
        }

        const typeNames = { helmet:'安全帽', fire:'火灾', intrusion:'入侵检测', person:'人', bird:'鸟', cat:'猫', dog:'狗' };
        const typeColors = { helmet:'#0891b2', fire:'#b33a3a', intrusion:'#a67c00', person:'#2d7a4f', bird:'#d97706', cat:'#d97706', dog:'#d97706' };

        async function loadDashboard() {
            try {
                const data = await (await authFetch('/api/v1/stream/dashboard')).json();
                if (!data.success) return;

                document.getElementById('alarmTotal').textContent = data.alarm_total;
                document.getElementById('alarmToday').textContent = data.alarm_today;
                document.getElementById('detectTotal').textContent = data.detect_total;
                document.getElementById('streamCount').textContent = data.stream_count;

                // 类型分布
                const dist = data.alarm_type_dist || {};
                const entries = Object.entries(dist).sort((a, b) => b[1] - a[1]);
                const total = entries.reduce((s, e) => s + e[1], 0) || 1;
                const typeEl = document.getElementById('typeChart');
                if (entries.length) {
                    typeEl.innerHTML = `
                        <svg width="140" height="140" viewBox="0 0 140 140">
                            ${entries.reduce((acc, [type, count], i) => {
                                const pct = count / total;
                                const color = typeColors[type] || '#8a8580';
                                const r = 60, cx = 70, cy = 70;
                                let start = -90;
                                for (let j = 0; j < i; j++) start += (entries[j][1] / total) * 360;
                                const end = start + pct * 360;
                                const startRad = start * Math.PI / 180;
                                const endRad = end * Math.PI / 180;
                                const x1 = cx + r * Math.cos(startRad);
                                const y1 = cy + r * Math.sin(startRad);
                                const x2 = cx + r * Math.cos(endRad);
                                const y2 = cy + r * Math.sin(endRad);
                                const large = pct > 0.5 ? 1 : 0;
                                return acc + `<path d="M${cx},${cy} L${x1},${y1} A${r},${r} 0 ${large} 1 ${x2},${y2} Z" fill="${color}"/>`;
                            }, '')}
                            <circle cx="70" cy="70" r="35" fill="var(--bg-card-solid)"/>
                            <text x="70" y="68" text-anchor="middle" font-size="18" font-weight="700" fill="var(--ink)">${total}</text>
                            <text x="70" y="82" text-anchor="middle" font-size="9" fill="var(--ink-muted)">总计</text>
                        </svg>
                        <div class="donut-legend">
                            ${entries.map(([type, count]) => `<div class="legend-item"><span class="legend-dot" style="background:${typeColors[type]||'#8a8580'}"></span><span>${typeNames[type]||type}</span><span class="legend-count">${count}</span></div>`).join('')}
                        </div>
                    `;
                } else {
                    typeEl.innerHTML = '<div style="text-align:center;color:var(--ink-faint);width:100%;">暂无数据</div>';
                }

            } catch (e) { console.error(e); }
        }

        async function loadTrend() {
            try {
                const data = await (await authFetch('/api/v1/stream/dashboard/trend?days=7')).json();
                if (!data.success) return;
                const trend = data.trend || [];
                const el = document.getElementById('trendChart');
                if (!trend.length) {
                    el.innerHTML = '<div style="text-align:center;color:var(--ink-faint);width:100%;padding-top:60px;">暂无数据</div>';
                    return;
                }
                const maxVal = Math.max(...trend.map(t => t.count), 1);
                el.innerHTML = trend.map(t => {
                    const h = Math.max(4, (t.count / maxVal) * 160);
                    const day = new Date(t.date).toLocaleDateString('zh-CN', { month:'short', day:'numeric' });
                    return `<div class="bar-col"><div class="bar-value">${t.count}</div><div class="bar" style="height:${h}px;background:var(--danger)"></div><div class="bar-label">${day}</div></div>`;
                }).join('');
            } catch (e) { console.error(e); }
        }

        loadDashboard();
        loadTrend();
    </script>
</body>
</html>
