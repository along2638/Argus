<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/svg+xml" href="/static/favicon.svg">
    <title>Argus — 操作日志</title>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <script src="/static/theme.js"></script>
    <script src="/static/loading.js"></script>
    <style>
        :root{--bg:#f8f7f5;--bg-card:#fff;--bg-card-solid:#fff;--bg-input:#f5f4f2;--border:#e8e6e3;--border-focus:#b8b5b0;--ink:#1c1917;--ink-light:#44403c;--ink-muted:#78716c;--ink-faint:#a8a29e;--accent:#292524;--accent-soft:rgba(26,26,26,0.06);--success:#16a34a;--success-bg:rgba(45,122,79,0.08);--danger:#dc2626;--danger-bg:rgba(179,58,58,0.08);--warning:#d97706;--radius:8px;--radius-md:12px;--radius-lg:16px;--shadow:0 1px 3px rgba(0,0,0,0.04),0 8px 32px rgba(0,0,0,0.06);--shadow-sm:0 1px 2px rgba(0,0,0,0.04);--transition:0.2s ease}
        *{margin:0;padding:0;box-sizing:border-box}
        body{font-family: 'DM Sans', -apple-system, sans-serif;background:var(--bg);min-height:100vh;color:var(--ink);line-height:1.5;-webkit-font-smoothing:antialiased}
        body::before{content:'';position:fixed;inset:0;background:radial-gradient(ellipse 80% 50% at 20% 30%,rgba(180,170,155,0.08) 0%,transparent 70%),radial-gradient(ellipse 60% 40% at 75% 60%,rgba(160,150,135,0.06) 0%,transparent 60%);pointer-events:none;z-index:0}
        ::-webkit-scrollbar{width:5px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:rgba(0,0,0,0.1);border-radius:3px}

        .header{position:relative;z-index:1;display:flex;align-items:center;justify-content:space-between;padding:14px 32px;border-bottom:1px solid var(--border);background:var(--bg-card);backdrop-filter:blur(20px)}
        .header-left{display:flex;align-items:center;gap:12px}
        .header-logo{width:34px;height:34px;background:var(--ink);border-radius:9px;display:flex;align-items:center;justify-content:center;color:var(--bg);box-shadow:0 2px 8px rgba(0,0,0,0.15)}
        .header h1{font-size:1.1rem;font-weight:600}
        .header-right{display:flex;align-items:center;gap:8px}
        .header-link{color:var(--ink-muted);font-size:0.78rem;text-decoration:none;padding:5px 12px;border-radius:var(--radius);transition:var(--transition);border:1px solid transparent}
        .header-link:hover{color:var(--ink);border-color:var(--border)}

        .main{position:relative;z-index:1;max-width:1000px;margin:0 auto;padding:24px 32px 60px}

        .card{background:var(--bg-card);border:1px solid var(--border);border-radius:var(--radius-lg);backdrop-filter:blur(20px);overflow:hidden;box-shadow:var(--shadow-sm)}
        .card-head{display:flex;align-items:center;justify-content:space-between;padding:16px 20px;border-bottom:1px solid var(--border)}
        .card-title{display:flex;align-items:center;gap:8px;font-size:0.84rem;font-weight:600}
        .card-body{padding:0}

        .btn{padding:6px 14px;border:none;border-radius:var(--radius);cursor:pointer;font-size:0.76rem;font-weight:500;font-family:inherit;transition:var(--transition)}
        .btn-ghost{background:transparent;color:var(--ink-muted);border:1px solid var(--border)}
        .btn-ghost:hover{border-color:var(--ink-faint);color:var(--ink)}
        .btn-sm{padding:4px 10px;font-size:0.7rem}

        .log-table{width:100%;border-collapse:collapse}
        .log-table th{text-align:left;padding:10px 16px;font-size:0.68rem;font-weight:600;color:var(--ink-muted);text-transform:uppercase;letter-spacing:0.04em;border-bottom:1px solid var(--border);background:var(--bg-input)}
        .log-table td{padding:10px 16px;font-size:0.78rem;border-bottom:1px solid var(--border)}
        .log-table tr:last-child td{border-bottom:none}
        .log-table tr:hover td{background:rgba(0,0,0,0.015)}

        .action-badge{display:inline-flex;padding:2px 8px;border-radius:var(--radius);font-size:0.68rem;font-weight:500}
        .action-badge.login{background:var(--success-bg);color:var(--success)}
        .action-badge.logout{background:var(--accent-soft);color:var(--ink-muted)}
        .action-badge.start_stream{background:rgba(8,145,178,0.1);color:#0891b2}
        .action-badge.stop_stream{background:var(--warning-bg);color:var(--warning)}
        .action-badge.detect{background:rgba(139,92,246,0.1);color:#8b5cf6}

        .pager{display:flex;align-items:center;justify-content:space-between;padding:10px 16px;border-top:1px solid var(--border);font-size:0.72rem;color:var(--ink-muted)}
        .pager-btns{display:flex;gap:3px}
        .pager-btns button{padding:3px 9px;background:var(--bg-input);border:1px solid var(--border);border-radius:var(--radius);color:var(--ink-muted);font-size:0.7rem;font-family:inherit;cursor:pointer;transition:var(--transition)}
        .pager-btns button:hover:not(:disabled){border-color:var(--ink-faint);color:var(--ink)}
        .pager-btns button.active{background:var(--ink);color:var(--bg);border-color:var(--ink)}
        .empty{text-align:center;padding:40px 16px;color:var(--ink-faint);font-size:0.84rem}

        .footer{text-align:center;padding:40px 0 0;color:var(--ink-faint);font-size:0.73rem}
    </style>
</head>
<body>
    <header class="header">
        <div class="header-left">
            <div class="header-logo"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg></div>
            <h1>Argus 智能监控</h1>
        </div>
        <div class="header-right">
            <a href="/" class="header-link">监控主页</a>
            <a href="/static/detect.html" class="header-link">图片检测</a>
            <a href="/static/users.html" class="header-link">用户管理</a>
            <button id="themeToggle" class="header-link" onclick="toggleTheme()" style="cursor:pointer;border:none;font-family:inherit;background:var(--accent-soft);font-weight:500;">深色</button>
            <button class="header-link" onclick="doLogout()" style="cursor:pointer;border:none;font-family:inherit;background:var(--accent-soft);font-weight:500;">退出登录</button>
        </div>
    </header>

    <div class="main">
        <div class="card">
            <div class="card-head">
                <span class="card-title">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><polyline points="14,2 14,8 20,8"/></svg>
                    操作日志
                </span>
                <button class="btn btn-ghost btn-sm" onclick="loadLogs()">刷新</button>
            </div>
            <div class="card-body">
                <table class="log-table">
                    <thead>
                        <tr>
                            <th style="width:160px">时间</th>
                            <th style="width:100px">用户</th>
                            <th style="width:120px">操作</th>
                            <th>详情</th>
                            <th style="width:120px">IP</th>
                        </tr>
                    </thead>
                    <tbody id="logList">
                        <tr><td colspan="5"><div class="empty">加载中...</div></td></tr>
                    </tbody>
                </table>
            </div>
            <div class="pager" id="pager" style="display:none;">
                <span id="pagerInfo"></span>
                <div class="pager-btns" id="pagerBtns"></div>
            </div>
        </div>
    </div>

    <footer class="footer">Argus 智能监控告警系统 v0.1.0</footer>

    <script src="/static/confirm.js"></script>
    <script>
        let page = 1;
        const PAGE_SIZE = 30;

        function authFetch(url, opts = {}) {
            const t = localStorage.getItem('token');
            if (!opts.headers) opts.headers = {};
            if (t) opts.headers['Authorization'] = 'Bearer ' + t;
            return fetch(url, opts);
        }

        function doLogout() {
            localStorage.removeItem('token');
            localStorage.removeItem('user');
            fetch('/api/v1/auth/logout', { method: 'POST' });
            window.location.href = '/login';
        }

        const actionNames = { login:'登录', logout:'退出登录', start_stream:'启动流', stop_stream:'停止流', detect:'图片检测', register:'注册用户' };

        async function loadLogs() {
            try {
                const resp = await authFetch('/api/v1/auth/logs?limit=200');
                const data = await resp.json();
                const logs = data.logs || [];
                const total = logs.length;
                const tp = Math.ceil(total / PAGE_SIZE);
                if (page > tp) page = tp || 1;
                const start = (page - 1) * PAGE_SIZE;
                const pageData = logs.slice(start, start + PAGE_SIZE);
                const tbody = document.getElementById('logList');

                if (!pageData.length) {
                    tbody.innerHTML = '<tr><td colspan="5"><div class="empty">暂无日志</div></td></tr>';
                    document.getElementById('pager').style.display = 'none';
                    return;
                }

                tbody.innerHTML = pageData.map(l => {
                    const t = new Date(l.create_time).toLocaleString('zh-CN');
                    const action = actionNames[l.action] || l.action;
                    const actionClass = l.action.replace('_', '_');
                    return `<tr>
                        <td style="font-family:'JetBrains Mono',monospace;font-size:0.72rem;color:var(--ink-muted)">${t}</td>
                        <td>${l.username || '-'}</td>
                        <td><span class="action-badge ${actionClass}">${action}</span></td>
                        <td style="color:var(--ink-light)">${l.detail || '-'}</td>
                        <td style="font-family:'JetBrains Mono',monospace;font-size:0.72rem;color:var(--ink-faint)">${l.ip_address || '-'}</td>
                    </tr>`;
                }).join('');

                const pager = document.getElementById('pager');
                if (tp > 1) {
                    pager.style.display = 'flex';
                    document.getElementById('pagerInfo').textContent = `共 ${total} 条，第 ${page}/${tp} 页`;
                    let btns = `<button ${page<=1?'disabled':''} onclick="page--;loadLogs()">‹</button>`;
                    for (let p = 1; p <= tp; p++) {
                        if (tp > 7 && p > 2 && p < tp-1 && Math.abs(p-page) > 1) {
                            if (p === 3 || p === tp-2) btns += '<button disabled>…</button>';
                            continue;
                        }
                        btns += `<button class="${p===page?'active':''}" onclick="page=${p};loadLogs()">${p}</button>`;
                    }
                    btns += `<button ${page>=tp?'disabled':''} onclick="page++;loadLogs()">›</button>`;
                    document.getElementById('pagerBtns').innerHTML = btns;
                } else {
                    pager.style.display = 'none';
                }
            } catch (e) {
                console.error(e);
            }
        }

        loadLogs();
    </script>
</body>
</html>
