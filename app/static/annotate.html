<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Argus — 手动标注</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #f5f0eb;
            --bg-card: rgba(255,255,255,0.55);
            --bg-card-solid: #fff;
            --bg-input: rgba(0,0,0,0.03);
            --border: rgba(0,0,0,0.06);
            --border-focus: rgba(26,26,26,0.25);
            --ink: #1a1a1a;
            --ink-light: #3d3d3d;
            --ink-muted: #8a8580;
            --ink-faint: #c4bfb8;
            --accent: #1a1a1a;
            --accent-soft: rgba(26,26,26,0.06);
            --success: #2d7a4f;
            --success-bg: rgba(45,122,79,0.08);
            --danger: #b33a3a;
            --danger-bg: rgba(179,58,58,0.08);
            --warning: #a67c00;
            --warning-bg: rgba(166,124,0,0.08);
            --radius: 999px;
            --radius-md: 12px;
            --radius-lg: 16px;
            --shadow: 0 1px 3px rgba(0,0,0,0.04), 0 8px 32px rgba(0,0,0,0.06);
            --shadow-sm: 0 1px 2px rgba(0,0,0,0.04);
            --transition: 0.2s ease;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: var(--bg);
            min-height: 100vh;
            color: var(--ink);
            line-height: 1.5;
            -webkit-font-smoothing: antialiased;
            position: relative;
            display: flex;
            flex-direction: column;
        }

        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background:
                radial-gradient(ellipse 80% 50% at 20% 30%, rgba(180,170,155,0.08) 0%, transparent 70%),
                radial-gradient(ellipse 60% 40% at 75% 60%, rgba(160,150,135,0.06) 0%, transparent 60%),
                radial-gradient(ellipse 90% 60% at 50% 80%, rgba(170,160,145,0.05) 0%, transparent 70%);
            pointer-events: none;
            z-index: 0;
        }

        ::-webkit-scrollbar { width: 5px; height: 5px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: rgba(0,0,0,0.1); border-radius: 3px; }
        ::-webkit-scrollbar-thumb:hover { background: rgba(0,0,0,0.18); }

        /* ── Header ── */
        .header {
            position: relative;
            z-index: 1;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 16px 32px;
            border-bottom: 1px solid var(--border);
            background: var(--bg-card);
            backdrop-filter: blur(20px);
        }

        .header-left { display: flex; align-items: center; gap: 12px; }

        .header-logo {
            width: 34px; height: 34px;
            background: var(--ink);
            border-radius: 9px;
            display: flex; align-items: center; justify-content: center;
            color: var(--bg);
            font-size: 15px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.15);
        }

        .header h1 {
            font-size: 1.15rem;
            font-weight: 600;
            letter-spacing: -0.02em;
        }

        .header-right { display: flex; align-items: center; gap: 10px; }

        .header-badge {
            display: inline-flex; align-items: center; gap: 6px;
            padding: 5px 14px;
            background: var(--accent-soft);
            color: var(--ink-muted);
            font-size: 0.78rem;
            font-weight: 500;
            border-radius: var(--radius);
            font-family: 'JetBrains Mono', monospace;
        }

        .header-link {
            color: var(--ink-muted);
            font-size: 0.8rem;
            text-decoration: none;
            padding: 6px 14px;
            border-radius: var(--radius);
            transition: var(--transition);
            border: 1px solid transparent;
        }
        .header-link:hover { color: var(--ink); border-color: var(--border); }

        /* ── Layout ── */
        .app {
            position: relative;
            z-index: 1;
            flex: 1;
            display: flex;
            overflow: hidden;
        }

        /* ── Sidebar ── */
        .sidebar {
            width: 280px;
            background: var(--bg-card);
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            flex-shrink: 0;
        }

        .sidebar-head {
            padding: 16px 20px;
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .sidebar-title {
            font-size: 0.84rem;
            font-weight: 600;
            color: var(--ink);
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .sidebar-title .icon {
            width: 16px; height: 16px;
            opacity: 0.5;
        }

        .file-scroll {
            flex: 1;
            overflow-y: auto;
            padding: 8px;
        }

        .file-item {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 10px 12px;
            border-radius: var(--radius-md);
            cursor: pointer;
            transition: var(--transition);
            margin-bottom: 2px;
        }
        .file-item:hover { background: var(--accent-soft); }
        .file-item.active { background: var(--ink); color: var(--bg); }
        .file-item.active .file-name { color: var(--bg); }
        .file-item.active .file-status { color: rgba(255,255,255,0.6); }

        .file-dot {
            width: 6px; height: 6px;
            border-radius: 50%;
            background: var(--ink-faint);
            flex-shrink: 0;
        }
        .file-item.done .file-dot { background: var(--success); }
        .file-item.active .file-dot { background: var(--bg); }

        .file-name {
            font-size: 0.78rem;
            color: var(--ink-light);
            flex: 1;
            min-width: 0;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
            font-family: 'JetBrains Mono', monospace;
        }

        .file-status {
            font-size: 0.68rem;
            color: var(--ink-faint);
        }

        /* ── Main Area ── */
        .main-area {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* ── Toolbar ── */
        .toolbar {
            padding: 12px 24px;
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            gap: 8px;
            flex-wrap: wrap;
            background: var(--bg-card);
        }

        .btn {
            padding: 8px 18px;
            border: none;
            border-radius: var(--radius);
            cursor: pointer;
            font-size: 0.78rem;
            font-weight: 500;
            font-family: inherit;
            transition: var(--transition);
            display: inline-flex;
            align-items: center;
            gap: 5px;
        }
        .btn:disabled { opacity: 0.4; cursor: not-allowed; }

        .btn-primary {
            background: var(--ink);
            color: var(--bg);
        }
        .btn-primary:hover:not(:disabled) { background: #333; transform: translateY(-1px); box-shadow: 0 4px 16px rgba(0,0,0,0.12); }

        .btn-ghost {
            background: transparent;
            color: var(--ink-muted);
            border: 1px solid var(--border);
        }
        .btn-ghost:hover { border-color: var(--ink-faint); color: var(--ink); }

        .btn-success {
            background: var(--success);
            color: #fff;
        }
        .btn-success:hover:not(:disabled) { opacity: 0.9; transform: translateY(-1px); box-shadow: 0 4px 16px rgba(45,122,79,0.25); }

        .btn-danger {
            background: transparent;
            color: var(--danger);
            border: 1px solid var(--danger-bg);
        }
        .btn-danger:hover { background: var(--danger-bg); }

        .toolbar-sep {
            width: 1px;
            height: 20px;
            background: var(--border);
            margin: 0 4px;
        }

        .toolbar-hint {
            margin-left: auto;
            font-size: 0.72rem;
            color: var(--ink-faint);
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .toolbar-hint kbd {
            padding: 2px 6px;
            background: var(--bg-input);
            border: 1px solid var(--border);
            border-radius: 4px;
            font-size: 0.68rem;
            font-family: 'JetBrains Mono', monospace;
            color: var(--ink-muted);
        }

        /* ── Canvas Container ── */
        .canvas-wrapper {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 24px;
            overflow: auto;
            background: var(--bg-input);
        }

        .canvas-box {
            position: relative;
            border: 1px solid var(--border);
            border-radius: var(--radius-md);
            overflow: hidden;
            cursor: crosshair;
            box-shadow: var(--shadow);
            background: var(--bg-card-solid);
            line-height: 0;
        }

        canvas {
            display: block;
            max-width: 100%;
            max-height: calc(100vh - 200px);
        }

        .canvas-empty {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 80px 40px;
            color: var(--ink-faint);
        }
        .canvas-empty-icon {
            width: 48px; height: 48px;
            opacity: 0.2;
            margin-bottom: 12px;
        }
        .canvas-empty-text {
            font-size: 0.84rem;
        }

        /* ── Status Bar ── */
        .status-bar {
            padding: 8px 24px;
            border-top: 1px solid var(--border);
            background: var(--bg-card);
            display: flex;
            align-items: center;
            justify-content: space-between;
            font-size: 0.72rem;
            color: var(--ink-muted);
            font-family: 'JetBrains Mono', monospace;
        }

        .status-left { display: flex; align-items: center; gap: 16px; }

        .status-dot {
            width: 6px; height: 6px;
            border-radius: 50%;
            background: var(--success);
        }

        /* ── Toast ── */
        .toast {
            position: fixed;
            top: 20px; right: 20px;
            padding: 10px 18px;
            border-radius: var(--radius);
            font-size: 0.8rem;
            font-weight: 500;
            z-index: 1000;
            animation: toastIn 0.25s ease;
            box-shadow: var(--shadow);
            display: flex; align-items: center; gap: 8px;
            font-family: inherit;
        }
        .toast.success { background: var(--bg-card-solid); color: var(--success); border: 1px solid var(--success-bg); }
        .toast.error { background: var(--bg-card-solid); color: var(--danger); border: 1px solid var(--danger-bg); }
        .toast.info { background: var(--bg-card-solid); color: var(--ink); border: 1px solid var(--border); }
        @keyframes toastIn {
            from { transform: translateX(120%); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }

        /* ── Responsive ── */
        @media (max-width: 768px) {
            .sidebar { display: none; }
            .toolbar-hint { display: none; }
        }
    </style>
</head>
<body>
    <div id="notification" class="toast" style="display:none;"></div>

    <header class="header">
        <div class="header-left">
            <div class="header-logo"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg></div>
            <h1>Argus 智能监控</h1>
        </div>
        <div class="header-right">
            <span class="header-badge" id="progress">0 / 0 已标注</span>
            <a href="/" class="header-link">返回主页</a>
            <a href="/static/detect.html" target="_blank" class="header-link">图片检测</a>
            <button class="header-link" onclick="doLogout()" style="background:var(--accent-soft);color:var(--ink);font-weight:500;cursor:pointer;border:none;font-family:inherit;">退出登录</button>
        </div>
    </header>

    <div class="app">
        <aside class="sidebar">
            <div class="sidebar-head">
                <span class="sidebar-title">
                    <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M22 19a2 2 0 01-2 2H4a2 2 0 01-2-2V5a2 2 0 012-2h5l2 3h9a2 2 0 012 2z"/></svg>
                    待标注图片
                </span>
            </div>
            <div class="file-scroll" id="fileList"></div>
        </aside>

        <div class="main-area">
            <div class="toolbar">
                <button class="btn btn-ghost" onclick="prevImage()">← 上一张</button>
                <button class="btn btn-ghost" onclick="nextImage()">下一张 →</button>
                <div class="toolbar-sep"></div>
                <button class="btn btn-success" onclick="saveAnnotation()">保存标注</button>
                <button class="btn btn-danger" onclick="deleteLastBox()">删除框</button>
                <div class="toolbar-hint">
                    <span><kbd>Ctrl+S</kbd> 保存</span>
                    <span><kbd>←</kbd><kbd>→</kbd> 切换</span>
                    <span><kbd>Del</kbd> 删框</span>
                </div>
            </div>

            <div class="canvas-wrapper" id="canvasWrapper">
                <div class="canvas-box" id="canvasBox" style="display:none;">
                    <canvas id="canvas" width="800" height="600"></canvas>
                </div>
                <div class="canvas-empty" id="canvasEmpty">
                    <svg class="canvas-empty-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.2"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21,15 16,10 5,21"/></svg>
                    <div class="canvas-empty-text">等待加载图片...</div>
                </div>
            </div>

            <div class="status-bar">
                <div class="status-left">
                    <div class="status-dot"></div>
                    <span id="status">就绪</span>
                </div>
                <span id="boxCount">0 个标注框</span>
            </div>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        const fileList = document.getElementById('fileList');
        const progress = document.getElementById('progress');
        const status = document.getElementById('status');
        const boxCount = document.getElementById('boxCount');
        const canvasBox = document.getElementById('canvasBox');
        const canvasEmpty = document.getElementById('canvasEmpty');

        function authFetch(url, opts = {}) { const t = localStorage.getItem('token'); if (!opts.headers) opts.headers = {}; if (t) opts.headers['Authorization'] = 'Bearer ' + t; return fetch(url, opts); }
        let images = [];
        let currentIndex = 0;
        let boxes = [];
        let isDrawing = false;
        let startX, startY;
        let currentBox = null;
        let img = null;

        async function doLogout() {
            localStorage.removeItem('token');
            localStorage.removeItem('user');
            await authFetch('/api/v1/auth/logout', { method: 'POST' });
            window.location.href = '/login';
        }

        function showNotification(msg, type) {
            const el = document.getElementById('notification');
            el.innerHTML = msg;
            el.className = 'toast ' + type;
            el.style.display = 'flex';
            setTimeout(() => { el.style.display = 'none'; }, 2500);
        }

        async function loadFiles() {
            const response = await authFetch('/api/annotations/files');
            const data = await response.json();
            images = data.files;
            updateProgress();
            renderFileList();
            if (images.length > 0) loadImage(0);
        }

        function renderFileList() {
            const pending = images.filter(f => !f.annotated);
            fileList.innerHTML = pending.map((file, i) => {
                const realIndex = images.indexOf(file);
                const cls = realIndex === currentIndex ? 'active' : '';
                return `<div class="file-item ${cls}" onclick="saveAnnotation();loadImage(${realIndex})">
                    <div class="file-dot"></div>
                    <span class="file-name">${file.name}</span>
                </div>`;
            }).join('');
            if (pending.length === 0) {
                fileList.innerHTML = '<div class="canvas-empty" style="padding:40px 20px;"><div class="canvas-empty-text">所有图片已标注完成</div></div>';
            }
        }

        function loadImage(index) {
            if (index < 0 || index >= images.length) return;
            if (images[index].annotated) {
                const pending = images.filter(f => !f.annotated);
                if (pending.length > 0) {
                    loadImage(images.indexOf(pending[0]));
                }
                return;
            }
            currentIndex = index;
            boxes = [];
            img = new Image();
            img.onload = () => {
                canvas.width = img.width;
                canvas.height = img.height;
                ctx.drawImage(img, 0, 0);
                canvasBox.style.display = 'block';
                canvasEmpty.style.display = 'none';
                loadBoxes();
                renderFileList();
                updateProgress();
                status.textContent = images[currentIndex].name;
            };
            img.src = '/api/annotations/image/' + encodeURIComponent(images[currentIndex].name);
        }

        async function loadBoxes() {
            boxes = [];
            try {
                const url = '/api/annotations/box/' + encodeURIComponent(images[currentIndex].name);
                const response = await authFetch(url);
                const data = await response.json();
                if (data.boxes && data.boxes.length > 0) {
                    const imgW = img.width;
                    const imgH = img.height;
                    boxes = data.boxes.map(b => ({
                        x: (b.cx - b.w / 2) * imgW,
                        y: (b.cy - b.h / 2) * imgH,
                        w: b.w * imgW,
                        h: b.h * imgH
                    }));
                }
            } catch (e) {
                console.error('Load boxes error:', e);
            }
            renderBoxes();
            updateBoxCount();
        }

        function renderBoxes() {
            ctx.drawImage(img, 0, 0);
            boxes.forEach((box, i) => {
                ctx.strokeStyle = 'rgba(45,122,79,0.9)';
                ctx.lineWidth = 2;
                ctx.strokeRect(box.x, box.y, box.w, box.h);
                ctx.fillStyle = 'rgba(45,122,79,0.85)';
                ctx.font = '600 11px Inter, sans-serif';
                const label = `fire ${i + 1}`;
                const tw = ctx.measureText(label).width;
                ctx.beginPath();
                ctx.roundRect(box.x + 2, box.y - 18, tw + 10, 16, 3);
                ctx.fill();
                ctx.fillStyle = '#fff';
                ctx.fillText(label, box.x + 7, box.y - 6);
            });
        }

        canvas.onmousedown = (e) => {
            const rect = canvas.getBoundingClientRect();
            const scaleX = canvas.width / rect.width;
            const scaleY = canvas.height / rect.height;
            startX = (e.clientX - rect.left) * scaleX;
            startY = (e.clientY - rect.top) * scaleY;
            isDrawing = true;
            currentBox = { x: startX, y: startY, w: 0, h: 0 };
        };

        canvas.onmousemove = (e) => {
            if (!isDrawing) return;
            const rect = canvas.getBoundingClientRect();
            const scaleX = canvas.width / rect.width;
            const scaleY = canvas.height / rect.height;
            const x = (e.clientX - rect.left) * scaleX;
            const y = (e.clientY - rect.top) * scaleY;
            currentBox.w = x - startX;
            currentBox.h = y - startY;
            renderBoxes();
            ctx.strokeStyle = 'rgba(26,26,26,0.5)';
            ctx.lineWidth = 1.5;
            ctx.setLineDash([4, 4]);
            ctx.strokeRect(
                Math.min(startX, x), Math.min(startY, y),
                Math.abs(currentBox.w), Math.abs(currentBox.h)
            );
            ctx.setLineDash([]);
        };

        canvas.onmouseup = (e) => {
            if (!isDrawing) return;
            isDrawing = false;
            if (Math.abs(currentBox.w) > 5 && Math.abs(currentBox.h) > 5) {
                if (currentBox.w < 0) { currentBox.x += currentBox.w; currentBox.w = -currentBox.w; }
                if (currentBox.h < 0) { currentBox.y += currentBox.h; currentBox.h = -currentBox.h; }
                boxes.push(currentBox);
                showNotification(`已添加框 ${boxes.length}`, 'success');
            }
            currentBox = null;
            renderBoxes();
            updateBoxCount();
        };

        document.onkeydown = (e) => {
            if (e.ctrlKey && e.key === 's') { e.preventDefault(); saveAnnotation(); }
            else if (e.key === 'ArrowRight') nextImage();
            else if (e.key === 'ArrowLeft') prevImage();
            else if (e.key === 'Delete') deleteLastBox();
        };

        function nextImage() {
            saveAnnotation();
            const pending = images.filter(f => !f.annotated);
            if (pending.length > 0) {
                const next = images.indexOf(pending[0]);
                loadImage(next);
            }
        }
        function prevImage() {
            saveAnnotation();
            const pending = images.filter(f => !f.annotated);
            if (pending.length > 0) {
                const prev = images.indexOf(pending[pending.length - 1]);
                loadImage(prev);
            }
        }
        function deleteLastBox() {
            if (boxes.length > 0) {
                boxes.pop();
                renderBoxes();
                updateBoxCount();
                showNotification(`已删除，剩余 ${boxes.length} 个框`, 'info');
            }
        }

        async function saveAnnotation() {
            if (!images[currentIndex]) return;
            const imgW = img.width;
            const imgH = img.height;
            const yoloLines = boxes.map(box => {
                const cx = (box.x + box.w / 2) / imgW;
                const cy = (box.y + box.h / 2) / imgH;
                const w = box.w / imgW;
                const h = box.h / imgH;
                return `0 ${cx.toFixed(6)} ${cy.toFixed(6)} ${w.toFixed(6)} ${h.toFixed(6)}`;
            });

            try {
                const response = await authFetch('/api/annotations/save', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        filename: images[currentIndex].name,
                        content: yoloLines.join('\n')
                    })
                });
                const result = await response.json();
                if (result.success) {
                    images[currentIndex].annotated = boxes.length > 0;
                    renderFileList();
                    updateProgress();
                    showNotification(`已保存: ${images[currentIndex].name}`, 'success');
                    const pending = images.filter(f => !f.annotated);
                    if (pending.length > 0) {
                        setTimeout(() => loadImage(images.indexOf(pending[0])), 500);
                    }
                } else {
                    showNotification('保存失败', 'error');
                }
            } catch (e) {
                showNotification('保存失败: ' + e.message, 'error');
            }
        }

        function updateProgress() {
            const done = images.filter(f => f.annotated).length;
            progress.textContent = `${done} / ${images.length} 已标注`;
        }

        function updateBoxCount() {
            boxCount.textContent = `${boxes.length} 个标注框`;
        }

        loadFiles();
    </script>
</body>
</html>
