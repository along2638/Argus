version: "3.8"

services:
  # FastAPI Application
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: yolo-api
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      - APP_HOST=0.0.0.0
      - APP_PORT=8000
    volumes:
      - ./models:/app/models:ro
      - ./logs:/app/logs
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - yolo-net

  # ARQ Worker
  worker:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: yolo-worker
    env_file:
      - .env
    command: ["arq", "app.services.worker_tasks.WorkerSettings"]
    volumes:
      - ./models:/app/models:ro
      - ./logs:/app/logs
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - yolo-net

  # Redis (Optional - for local development)
  redis:
    image: redis:7-alpine
    container_name: yolo-redis
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - yolo-net

  # PostgreSQL (Optional - for local development)
  postgres:
    image: postgres:16-alpine
    container_name: yolo-postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: yolo_alarm
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres123
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./scripts/init_db.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - yolo-net

  # MinIO (Optional - for local development)
  minio:
    image: minio/minio:latest
    container_name: yolo-minio
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    volumes:
      - minio-data:/data
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - yolo-net

volumes:
  redis-data:
    driver: local
  postgres-data:
    driver: local
  minio-data:
    driver: local

networks:
  yolo-net:
    driver: bridge
